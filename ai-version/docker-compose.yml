version: '3.9'

services:

  db:
    image: postgres:16
    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: medicaldb

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:

    build: .

    ports:
      - "3000:3000"

    depends_on:
      - db

    env_file:
      - .env

volumes:
  postgres_data: