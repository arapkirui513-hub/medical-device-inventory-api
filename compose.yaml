services:
  db:
    image: postgres:17
    container_name: medical-device-db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: tasks

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tasks"]
      interval: 5s
      timeout: 5s
      retries: 5

    restart: unless-stopped

  api:
    build: .
    container_name: medical-device-api

    ports:
      - "3000:3000"

    environment:
      DATABASE_URL: postgres://postgres:dev@db:5432/tasks
      PORT: 3000

    depends_on:
      db:
        condition: service_healthy

    restart: unless-stopped

volumes:
  postgres_data: