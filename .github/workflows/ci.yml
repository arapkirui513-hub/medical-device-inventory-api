name: CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17

        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: dev
          POSTGRES_DB: tasks

        ports:
          - 5432:5432

        options: >-
          --health-cmd="pg_isready -U postgres -d tasks"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgres://postgres:dev@localhost:5432/tasks
      PORT: 3000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Start API
        run: |
          npm start &
          sleep 10

      - name: Verify health endpoint
        run: |
          curl --fail http://localhost:3000/

      - name: Verify seeded data
        run: |
          RESPONSE=$(curl --fail http://localhost:3000/devices)

          echo "$RESPONSE"

          echo "$RESPONSE" | grep "Infusion Pump"